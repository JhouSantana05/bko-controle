<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKO PRO - Merlin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:0}
header{background:#020617;padding:15px;display:flex;gap:10px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.nav{background:#1e293b;color:white}
.active{background:#38bdf8}
.section{display:none;padding:20px}
.section.active{display:block}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
input{width:100%;padding:8px;border-radius:6px;border:none;margin-top:5px}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #334155}
</style>
</head>
<body>
<header>
<button class="nav active" onclick="nav('home')">Home</button>
<button class="nav" onclick="nav('viagem')">Viagem</button>
<button class="nav" onclick="nav('relatorio')">Relatório</button>
</header>

<div id="home" class="section active">
<div class="grid">
<div class="card"><h3>Total Viagens</h3><h1 id="total">0</h1></div>
<div class="card"><h3>Aprovadas</h3><h1 id="ok">0</h1></div>
<div class="card"><h3>Pendentes</h3><h1 id="pend">0</h1></div>
<div class="card"><h3>Valor Total</h3><h1 id="valor">R$0</h1></div>
</div>
<canvas id="chart"></canvas>
</div>

<div id="viagem" class="section">
<div class="card">
<h2>Nova Viagem</h2>
<div class="grid">
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="gestor" placeholder="Gestor">
<input id="projeto" placeholder="Projeto">
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="ida" type="date">
<input id="volta" type="date">
<input id="hotel" placeholder="Hotel">
<input id="valorPassagem" placeholder="Valor Passagem">
<input id="valorHotel" placeholder="Valor Hotel">
</div>
<button onclick="salvar()">Salvar</button>
</div>
</div>

<div id="relatorio" class="section">
<div class="card">
<h2>Relatório</h2>
<table>
<thead>
<tr><th>Nome</th><th>Projeto</th><th>Status</th><th>Valor</th></tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('bko2'))||[]
let chart

function nav(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
if(id==='home')dash()
if(id==='relatorio')render()
}

function salvar(){
let v={
nome:nome.value,
email:email.value,
gestor:gestor.value,
projeto:projeto.value,
origem:origem.value,
destino:destino.value,
ida:ida.value,
volta:volta.value,
hotel:hotel.value,
valorPassagem:+valorPassagem.value||0,
valorHotel:+valorHotel.value||0,
status:'PENDENTE'
}
db.push(v)
localStorage.setItem('bko2',JSON.stringify(db))
alert('Salvo')
document.querySelectorAll('input').forEach(i=>i.value='')
nav('relatorio')
}

function render(){
lista.innerHTML=''
db.forEach(v=>{
let total=v.valorPassagem+v.valorHotel
lista.innerHTML+=`<tr>
<td>${v.nome}</td>
<td>${v.projeto}</td>
<td>${v.status}</td>
<td>R$${total}</td>
</tr>`
})
}

function dash(){
let ok=db.filter(v=>v.status==='OK').length
let total=db.length
let valor=db.reduce((s,v)=>s+v.valorHotel+v.valorPassagem,0)

document.getElementById('total').innerText=total
okEl=document.getElementById('ok').innerText=ok
pend=document.getElementById('pend').innerText=total-ok
document.getElementById('valor').innerText='R$'+valor

if(chart)chart.destroy()
chart=new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{labels:['OK','Pendente'],datasets:[{data:[ok,total-ok]}]}
})
}

window.onload=dash
</script>
</body>
</html>
