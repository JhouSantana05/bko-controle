<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Controle BKO - Merlin Dev</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #2ecc71;
            --warning: #f1c40f; --danger: #e74c3c; --bg: #f4f7f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter'; }
        body { background: var(--bg); }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
        }

        nav { display: flex; gap: 10px; }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 6px;
        }

        .nav-btn.active { background: var(--accent); }

        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; }
    </style>
</head>

<body>

<header>
    <div>BKO PRINCIPAL</div>
    <nav>
        <button class="nav-btn active" data-view="home">Home</button>
        <button class="nav-btn" data-view="viagens">+ Viagem</button>
        <button class="nav-btn" data-view="lista">Relatório</button>
    </nav>
</header>

<section id="home" class="view-section active">
    <h2>Home</h2>
</section>

<section id="viagens" class="view-section">
    <h2>Viagens</h2>
</section>

<section id="lista" class="view-section">
    <h2>Relatório</h2>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

    function showView(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-view="${id}"]`).classList.add('active');
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const view = btn.getAttribute('data-view');
            showView(view);
        });
    });

});
</script>

</body>
</html>
