<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKO Controle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary: #2563eb;
    --bg: #f1f5f9;
    --white: #ffffff;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg);
}

header {
    background: var(--primary);
    color:white;
    padding:15px;
    display:flex;
    gap:10px;
}

button {
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.section {
    display:none;
    padding:20px;
}

.active { display:block; }

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input {
    padding:10px;
    width:100%;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<button onclick="nav('home')">Home</button>
<button onclick="nav('cadastro')">Cadastro</button>
<button onclick="nav('relatorio')">Relatório</button>
</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="grid">
<div class="card">Total: <b id="total">0</b></div>
</div>

<canvas id="grafico"></canvas>

</div>

<!-- CADASTRO -->
<div id="cadastro" class="section">

<h2>Novo Registro</h2>

<div class="grid">
<input id="nome" placeholder="Nome">
<input id="tipo" placeholder="Tipo (Viagem / Reembolso / Correios)">
<input id="data" type="date">
<input id="valor" type="number" placeholder="Valor">
</div>

<button onclick="salvar()">Salvar</button>

</div>

<!-- RELATORIO -->
<div id="relatorio" class="section">

<h2>Relatório</h2>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Tipo</th>
<th>Data</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<script>

let db = JSON.parse(localStorage.getItem('bko_app')) || []
let chart

function nav(t){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(t).classList.add('active')

if(t==='home') dash()
if(t==='relatorio') render()
}

function salvar(){

let item = {
nome: nome.value,
tipo: tipo.value,
data: data.value,
valor: parseFloat(valor.value)||0
}

db.push(item)
localStorage.setItem('bko_app', JSON.stringify(db))

document.querySelectorAll('input').forEach(i=>i.value="")

nav('relatorio')
}

function render(){

lista.innerHTML=""

db.forEach(v=>{
lista.innerHTML += `
<tr>
<td>${v.nome}</td>
<td>${v.tipo}</td>
<td>${v.data}</td>
<td>R$ ${v.valor}</td>
</tr>
`
})

}

function dash(){

document.getElementById('total').innerText = db.length

if(chart) chart.destroy()

chart = new Chart(document.getElementById('grafico'),{
type:'bar',
data:{
labels: db.map(v=>v.nome),
datasets:[{
label:'Valores',
data: db.map(v=>v.valor)
}]
}
})

}

window.onload = dash

</script>

</body>
</html>
