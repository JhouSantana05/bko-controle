<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKO Controle</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
--primary:#1e293b;
--accent:#3b82f6;
--bg:#f1f5f9;
--white:#fff;
--success:#22c55e;
--warning:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}
body{background:var(--bg);}

header{
background:var(--primary);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav button{
background:transparent;
border:none;
color:white;
margin:0 5px;
cursor:pointer;
font-weight:600;
}

main{padding:20px;}

.view{display:none;}
.view.active{display:block;}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-add{background:#e2e8f0;}
.btn-save{background:var(--success);color:white;margin-top:15px;width:100%;}
</style>
</head>

<body>

<header>
<div>BKO</div>
<nav>
<button onclick="showView('home')">Home</button>
<button onclick="showView('viagens')">Viagens</button>
</nav>
</header>

<main>

<!-- HOME -->
<div id="home" class="view active">
<div class="card">
<h3>Dashboard (em construção)</h3>
</div>
</div>

<!-- VIAGENS -->
<div id="viagens" class="view">
<div class="card">

<h3>Nova Viagem</h3><br>

<div class="grid">
<input placeholder="Gestor" id="gestor">
<input placeholder="Projeto" id="projeto">
<input placeholder="Solicitado (data)" type="date" id="solicitado">
<input placeholder="Email" id="email">
<input placeholder="Nome completo" id="nome">
<input placeholder="Almope" id="almope">
<input placeholder="Motivo da viagem" id="motivo">
<input placeholder="Sugestão de hotel" id="hotelSugestao">
</div>

<h4 style="margin-top:15px;">Trechos</h4>
<div id="trechos"></div>
<button class="btn-add" onclick="addTrecho()">+ Adicionar Trecho</button>

<h4 style="margin-top:15px;">Hospedagem</h4>
<div id="hoteis"></div>
<button class="btn-add" onclick="addHotel()">+ Adicionar Hotel</button>

<h4 style="margin-top:15px;">Valores (após cotação)</h4>
<div class="grid">
<input placeholder="Valor Passagem" id="valorPassagem">
<input placeholder="Valor Hospedagem" id="valorHotel">
</div>

<button class="btn-save" onclick="salvar()">Salvar</button>

</div>
</div>

</main>

<script>

let db = [];

function showView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* TRECHOS */
function addTrecho(){
let div = document.createElement('div');
div.className="card";
div.innerHTML=`
<div class="grid">
<input placeholder="Origem" class="origem">
<input placeholder="Destino" class="destino">
<input type="date" class="ida">
<input type="date" class="volta">
<input placeholder="Tipo deslocamento" class="tipo">
</div>`;
document.getElementById('trechos').appendChild(div);
}

/* HOTEL */
function addHotel(){
let div = document.createElement('div');
div.className="card";
div.innerHTML=`
<div class="grid">
<input placeholder="Hotel" class="nomeHotel">
<input type="date" class="checkin">
<input type="date" class="checkout">
</div>`;
document.getElementById('hoteis').appendChild(div);
}

/* SALVAR */
function salvar(){

let trechos = Array.from(document.querySelectorAll('#trechos .card')).map(t=>({
origem:t.querySelector('.origem').value,
destino:t.querySelector('.destino').value,
ida:t.querySelector('.ida').value,
volta:t.querySelector('.volta').value,
tipo:t.querySelector('.tipo').value
}));

let hoteis = Array.from(document.querySelectorAll('#hoteis .card')).map(h=>({
hotel:h.querySelector('.nomeHotel').value,
checkin:h.querySelector('.checkin').value,
checkout:h.querySelector('.checkout').value
}));

let viagem = {
gestor:gestor.value,
projeto:projeto.value,
solicitado:solicitado.value,
email:email.value,
nome:nome.value,
almope:almope.value,
motivo:motivo.value,
sugestaoHotel:hotelSugestao.value,
trechos,
hoteis,
valorPassagem:valorPassagem.value,
valorHotel:valorHotel.value
};

db.push(viagem);

alert("Salvo com sucesso");
console.log(db);
}

window.onload=()=>{
addTrecho();
addHotel();
};

</script>

</body>
</html>
