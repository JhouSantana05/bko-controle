<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKO PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary: #002f6c;
    --accent: #00a3e0;
    --success: #28a745;
    --warning: #ffc107;
    --danger: #dc3545;
    --bg: #f5f7fa;
    --white: #ffffff;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg);
}

header {
    background: var(--primary);
    color: white;
    padding: 15px;
}

button {
    padding:10px;
    margin:5px;
    cursor:pointer;
}

.section {display:none; padding:20px;}
.active {display:block;}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input {
    padding:8px;
    width:100%;
}

table {
    width:100%;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
<button onclick="nav('home')">Home</button>
<button onclick="nav('viagem')">Viagem</button>
<button onclick="nav('relatorio')">Relatório</button>
</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="grid">
<div class="card">Total: <b id="h-total">0</b></div>
<div class="card">OK: <b id="h-ok">0</b></div>
<div class="card">Pendente: <b id="h-pend">0</b></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- VIAGEM -->
<div id="viagem" class="section">

<h2>Solicitação de Viagem</h2>

<div class="grid">

<input id="vGestor" placeholder="Gestor">
<input id="vProjeto" placeholder="Projeto">
<input type="date" id="vSolicitado">

<input id="vEmail" placeholder="Email" style="grid-column: span 2;">
<input id="vNome" placeholder="Nome Completo">

<input id="vAlmope" placeholder="Almope">
<input id="vMotivo" placeholder="Motivo">

<input id="vOrigem" placeholder="Origem">
<input id="vDestino" placeholder="Destino">

<input type="date" id="vIda">
<input type="date" id="vVolta">

<input id="vHotel" placeholder="Hotel">

<input type="number" id="vPassagem" placeholder="Valor Passagem">
<input type="number" id="vHospedagem" placeholder="Valor Hospedagem">

</div>

<button onclick="salvar()">Salvar</button>

</div>

<!-- RELATORIO -->
<div id="relatorio" class="section">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Projeto</th>
<th>Aprovações</th>
<th>Status</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<script>

let db = JSON.parse(localStorage.getItem('bko')) || []
let chart

function nav(t){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(t).classList.add('active')

if(t==='home') dash()
if(t==='relatorio') render()
}

function salvar(){

let v = {
gestor:vGestor.value,
projeto:vProjeto.value,
solicitado:vSolicitado.value,
email:vEmail.value,
nome:vNome.value,
almope:vAlmope.value,
motivo:vMotivo.value,
origem:vOrigem.value,
destino:vDestino.value,
ida:vIda.value,
volta:vVolta.value,
hotel:vHotel.value,
valorPassagem:parseFloat(vPassagem.value)||0,
valorHospedagem:parseFloat(vHospedagem.value)||0,

ap:{gg:false,mv:false,fc:false,hc:false}
}

db.push(v)
localStorage.setItem('bko', JSON.stringify(db))

document.querySelectorAll('input').forEach(i=>i.value="")

nav('relatorio')
}

function render(){

lista.innerHTML=""

db.forEach((v,i)=>{

let total = v.valorPassagem + v.valorHospedagem
let ok = v.ap.gg && v.ap.mv && v.ap.fc && v.ap.hc

lista.innerHTML += `
<tr>
<td>${v.nome}</td>
<td>${v.projeto}</td>
<td>
GG ${v.ap.gg?'✔️':'❌'}<br>
MV ${v.ap.mv?'✔️':'❌'}<br>
FC ${v.ap.fc?'✔️':'❌'}<br>
HC ${v.ap.hc?'✔️':'❌'}
</td>
<td>${ok?'APROVADO':'PENDENTE'}</td>
<td>R$ ${total}</td>
</tr>
`
})

}

function dash(){

let ok = db.filter(v=>v.ap.gg && v.ap.mv && v.ap.fc && v.ap.hc).length
let total = db.length

document.getElementById('h-total').innerText = total
document.getElementById('h-ok').innerText = ok
document.getElementById('h-pend').innerText = total-ok

if(chart) chart.destroy()

chart = new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{
labels:['Aprovado','Pendente'],
datasets:[{
data:[ok,total-ok]
}]
}
})

}

window.onload = dash

</script>

</body>
</html>
