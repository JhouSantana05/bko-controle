<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKO Controle Online</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Inter;background:#f4f7f6;margin:0}
header{background:#2c3e50;color:white;padding:15px;text-align:center}
main{padding:15px}

button{padding:10px;border:none;border-radius:6px;background:#3498db;color:white;font-weight:bold;margin-top:10px;width:100%}

input{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc}

.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}

.table{overflow:auto}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #eee;font-size:14px}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#2ecc71;
color:white;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<header>BKO ONLINE</header>

<main>

<div class="card">
<h3>Nova Viagem</h3>

<input id="nome" placeholder="Nome">
<input id="projeto" placeholder="Projeto">
<input type="date" id="data">

<button onclick="salvar()">Salvar</button>
</div>

<div class="card table">
<h3>Lista</h3>
<table>
<thead>
<tr>
<th>Nome</th>
<th>Projeto</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</main>

<div id="toast"></div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyB94R1lmGDE2b6WCJcQ6CYbQhrI3k3AR5c",
authDomain: "bko-controle.firebaseapp.com",
projectId: "bko-controle",
storageBucket: "bko-controle.firebasestorage.app",
messagingSenderId: "825168841483",
appId: "1:825168841483:web:9982b0167bdf0a343a700e",
measurementId: "G-4M5KVTR8P4"
};

// INIT
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// SALVAR
function salvar(){
db.collection("viagens").add({
nome:nome.value,
projeto:projeto.value,
data:data.value,
status:false
});
showToast("Salvo!");
}

// LISTENER TEMPO REAL
db.collection("viagens").onSnapshot(snapshot=>{
lista.innerHTML='';
snapshot.forEach(doc=>{
const v=doc.data();

lista.innerHTML+=`
<tr>
<td>${v.nome}</td>
<td>${v.projeto}</td>
<td>${v.status?'OK':'Pendente'}</td>
<td><button onclick="toggle('${doc.id}',${v.status})">Alterar</button></td>
</tr>`;
});
});

// ALTERAR STATUS
function toggle(id,status){
db.collection("viagens").doc(id).update({
status:!status
});
}

// TOAST
function showToast(msg){
toast.innerText=msg;
toast.style.display='block';
setTimeout(()=>toast.style.display='none',2000);
}
</script>

</body>
</html>
